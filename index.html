<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Najdi liščí rodinku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <div id="bigNumber">3</div>
  <h1>Najdi 3 liščata</h1>
  <p>Najdi také lišku a lišáka.</p>
  <button id="startBtn">Začít hledat</button>
</div>

<div id="game">
  <img src="images/1.png" class="layer" style="z-index:1;">
  <img src="images/2.png" class="layer" style="z-index:20;">

  <img src="images/fox_dad.png" class="animal" data-type="dad">
  <img src="images/fox_mom.png" class="animal" data-type="mom">
  <img src="images/fox_cub1.png" class="animal" data-type="cub">
  <img src="images/fox_cub2.png" class="animal" data-type="cub">
  <img src="images/fox_cub3.png" class="animal" data-type="cub">

  <img src="images/3.png" class="layer" style="z-index:30;">
  <img src="images/4.png" class="layer" style="z-index:40;">
</div>

<div id="panel">
  🐾 Liščata: <span id="cubsLeft">3</span><br>
  Liška: <span id="momStatus">❌</span><br>
  Lišák: <span id="dadStatus">❌</span>
</div>

<div id="winScreen">
  <h1>🎉 Našla jsi celou liščí rodinku!</h1>
  <button onclick="location.reload()">Hrát znovu</button>
</div>

<script src="script.js"></script>
</body>
</html>
