<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najdi liščí rodinku</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
    <div class="bigNumber">3</div>
    <h1>Najdi 3 liščata</h1>
    <button id="startBtn">Začít hledat</button>
</div>

<div id="game">

    <img src="images/liska/1.png" class="layer" style="z-index:1">

    <img src="images/liska/2.png" class="layer" style="z-index:20">

    <img src="images/liska/lisce1.png"
         class="animal cub"
         style="left:20%;top:62%;width:7%;z-index:10">

    <img src="images/liska/lisce2.png"
         class="animal cub"
         style="left:72%;top:68%;width:7%;z-index:10">

    <img src="images/liska/lisce3.png"
         class="animal cub"
         style="left:45%;top:75%;width:7%;z-index:10">

    <img src="images/liska/liska.png"
         class="animal mom"
         style="left:58%;top:58%;width:10%;z-index:10">

    <img src="images/liska/lisak.png"
         class="animal dad"
         style="left:28%;top:52%;width:10%;z-index:10">

    <img src="images/liska/3.png" class="layer" style="z-index:30">
    <img src="images/liska/4.png" class="layer" style="z-index:40">

</div>

<div id="panel">
🐾 Zbývá najít: <span id="count">3</span>
</div>

<script src="script.js"></script>

</body>
</html>
